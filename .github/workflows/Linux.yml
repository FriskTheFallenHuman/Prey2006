name: Linux Builds (x86_64 & x86)

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - .github/workflows/FreeBSD.yml
      - .github/workflows/Windows.yml
  pull_request:
    types: [edited, opened, synchronize]
    paths-ignore:
      - .github/workflows/FreeBSD.yml
      - .github/workflows/Windows.yml
  workflow_dispatch:

concurrency:
  # Cancel concurrent workflows for the same PR or commit hash.
  group: ${{github.workflow}}-${{github.event_name == 'pull_request' && github.head_ref || github.sha}}
  cancel-in-progress: true

jobs:
  build:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86]
        include:
          - arch: x86_64
            dll_name: gamex86_64.so
          - arch: x86
            dll_name: gamex86.so

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore apt cache
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgl1-mesa-dev libsdl2-dev libopenal-dev libcurl4-openssl-dev cmake ninja-build libfreetype6-dev ccache zip
          version: 1.0

      - name: Ensure ccache dir exists and init
        run: |
          mkdir -p ~/.ccache
          ccache --max-size=5G || true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.arch }}-
            ${{ runner.os }}-ccache-

      - name: Build the engine
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja -DDEDICATED=ON -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ../neo/
          ninja

      - name: Chmod game executables
        run: |
          chmod +x "${{ github.workspace }}/output/linux/prey06"
          chmod +x "${{ github.workspace }}/output/linux/prey06ded"

      - name: Copy base files and create gamepack
        shell: pwsh
        run: |
          ./scripts/package_pk4.ps1 -DllName "${{ matrix.dll_name }}" -OsName linux

      - name: Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prey2006-linux-${{ matrix.arch }}
          path: output/linux/
          compression-level: 6
