name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    uses: ./.github/workflows/Linux.yml

  windows:
    uses: ./.github/workflows/Windows.yml

  freebsd:
    uses: ./.github/workflows/FreeBSD.yml

  release:
    name: Draft release
    needs: [linux, windows, freebsd]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          cd artifacts

          # Linux tarballs
          tar czf prey2006-linux-x86.tar.gz -C prey2006-linux-x86 .
          tar czf prey2006-linux-x86_64.tar.gz -C prey2006-linux-x86_64 .

          # Windows zip
          cd prey2006-windows-x86
          zip -r ../prey2006-windows-x86.zip .
          cd ..
          cd prey2006-windows-x86_64
          zip -r ../prey2006-windows-x86_64.zip .
          cd ..

      - name: Create Pre Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/prey2006-windows-x86.zip
            artifacts/prey2006-windows-x86_64.zip
            artifacts/prey2006-linux-x86.tar.gz
            artifacts/prey2006-linux-x86_64.tar.gz
            artifacts/prey2006-freebsd.zip
